; ============================================================
; T-Dongle-S3 Smart USB Drive
; pioarduino 55.03.37 — Arduino Core 3.3.7, ESP-IDF 5.5.2
; Replaces espressif32@6.12.0 (Core 2.x, prebuilt liblwip.a).
; custom_sdkconfig triggers hybrid/source build of ESP-IDF
; components (including lwIP), enabling TCP_WND=65535 for
; ~300-600 KB/s download speed vs ~30 KB/s on prebuilt.
; First build: ~20-40 min (IDF compiled from source).
; Subsequent builds: ~2-4 min (IDF layer cached).
; ============================================================

[platformio]
; Only build/upload the hardware target by default.
; Native test env is excluded so "pio run --target upload" never tries to compile it.
; Run tests explicitly: pio test -e native
default_envs = t-dongle-s3
; Point pio test at the native test folder so PIO discovers the test files directly.
test_dir = test/native

[env:t-dongle-s3]
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board        = dongles3
framework    = arduino

; ── lwIP TCP window — requires pioarduino hybrid build mode ─
; custom_sdkconfig rebuilds lwIP from source with these values.
; TCP_WND 5760→65535: theoretical ceiling 115 KB/s→1.3 MB/s.
; SO_RCVBUF enables runtime setsockopt(SO_RCVBUF) in downloader.cpp.
custom_sdkconfig =
    CONFIG_LWIP_TCP_WND_DEFAULT=65535
    CONFIG_LWIP_TCP_SND_BUF_DEFAULT=65535
    CONFIG_LWIP_SO_RCVBUF=y
    CONFIG_LWIP_TCP_RECVMBOX_SIZE=64
    CONFIG_LWIP_UDP_RECVMBOX_SIZE=64
    CONFIG_LWIP_TCPIP_RECVMBOX_SIZE=64
    CONFIG_ESP_INSIGHTS_ENABLED=n
    ; ── TCP window scaling — allows server to send 8×64KB=512KB in-flight ─────
    ; Eliminates burst/pause caused by SD write stalls filling the 64KB window.
    ; At 400 KB/s a 1.3 s SD stall fits in the 512 KB scaled window (no pause).
    CONFIG_LWIP_WND_SCALE=y
    CONFIG_LWIP_TCP_RCV_SCALE=3

; ── Flash ──────────────────────────────────────────────────
; dongles3.json = official LilyGo board def: 16 MB QIO flash, No PSRAM variant.
board_build.flash_mode    = qio
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216
board_build.partitions    = partitions.csv

; ── Extra scripts ──────────────────────────────────────────
extra_scripts  =
    pre:disable_idf_comp_mgr.py
    pre:add_idf_includes.py

; ── Upload & Monitor ───────────────────────────────────────
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, default

; ── Build flags ────────────────────────────────────────────
build_flags =
    -O2
    -Wno-cpp
    -Wno-deprecated-declarations
    -DCORE_DEBUG_LEVEL=0
    ; ── pioarduino: prebuilt sdkconfig.h omits these — add manually ──
    -DCONFIG_TINYUSB_ENABLED=1
    -DCONFIG_TINYUSB_MSC_ENABLED=1
    -DCONFIG_TINYUSB_MSC_BUFSIZE=4096
    -DCONFIG_MDNS_MAX_INTERFACES=3
    ; ── ESPAsyncWebServer: disable in-flight credit guard ─────────────────────
    ; ASYNCWEBSERVER_USE_CHUNK_INFLIGHT=1 (default) throttles sends when
    ; space() < BUFF_SIZE (2872 B) — stalls non-chunked responses after first
    ; TCP window fills (sentLength > CONFIG_LWIP_TCP_WND_DEFAULT=5760).
    ; Disabling lets AsyncFileResponse stream files without guard interference.
    -DASYNCWEBSERVER_USE_CHUNK_INFLIGHT=0
    ; ── AsyncTCP: pin service task to Core 0 (lwIP/TCPIP core) ─────────────
    ; Core 0 hosts the lwIP TCPIP task. Pinning async_service_task here means
    ; TCP sends are local (no inter-core IPC) — avoids timing issues that stall
    ; large HTML responses (e.g. FILEMAN_HTML 16 KB) mid-transmission.
    ; SD DMA reads in async_service_task caused failures on Core 0 in IDF 5.x,
    ; but we have moved ALL SD reads to port 8080 (dl_server_loop, Core 1).
    ; Remaining async SD ops: writes (upload) + metadata (delete/rename/mkdir)
    ; — these do not use streaming DMA and work correctly on Core 0.
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0

; ── Libraries ──────────────────────────────────────────────
lib_deps =
    lovyan03/LovyanGFX                       @ ^1.2.0
    bblanchon/ArduinoJson                    @ ^7.3.1
    fastled/FastLED                          @ ^3.9.0       ; ~3.6.0 has compile issues on Core 3.x
    ESP32Async/ESPAsyncWebServer             @ ^3.6.0       ; mathieucarbou fork archived Jan 2025
    ESP32Async/AsyncTCP                      @ ^3.3.2       ; successor to mathieucarbou/AsyncTCP
    ricmoo/QRCode                            @ ^0.0.1       ; minimal QR encoder — Version 1-7, ~3 KB flash

; ── Native host tests ───────────────────────────────────────
; Run with: pio test -e native
; Tests pure-logic functions extracted from dl_server.cpp / web_server.cpp.
; No hardware, no SDK, no Arduino framework — compiles with the system GCC/Clang.
;
; Test files under test/native/ each have their own main(); PlatformIO Unity
; runner calls the appropriate main() per test file automatically.
;
; The stub header test/native/stubs/Arduino.h provides a host-compatible
; String implementation so the function copies compile without changes.
[env:native]
platform      = native
extra_scripts = pre:set_native_compiler.py
build_flags =
    -std=c++14
    -Wall
    -Wextra
    -Wno-unused-parameter
    ; Unity output to stdout — colour off for CI log readability.
    -DUNITY_OUTPUT_COLOR=0
    ; Expose test/native/stubs/ so #include "stubs/Arduino.h" resolves.
    -I test/native
test_framework = unity
