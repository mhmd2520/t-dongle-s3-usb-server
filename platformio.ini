; ============================================================
; T-Dongle-S3 Smart USB Drive
; espressif32@6.12.0 — official Espressif platform used by
; all working LilyGo T-Dongle-S3 examples (factory, HelloWorld).
; ============================================================

[env:t-dongle-s3]
platform     = espressif32@6.12.0
board        = dongles3
framework    = arduino

; ── Flash ──────────────────────────────────────────────────
; dongles3.json = official LilyGo board def: 16 MB QIO flash, No PSRAM variant.
board_build.flash_mode    = qio
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216
board_build.partitions    = partitions.csv

; ── Upload & Monitor ───────────────────────────────────────
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, default

; ── Build flags ────────────────────────────────────────────
build_flags =
    ; ── TFT_eSPI — ST7735 config for T-Dongle-S3 ──────────
    ; Matches official LilyGo lib: lib/TFT_eSPI/User_Setups/Setup209_LilyGo_T_Dongle_S3.h
    ; and pjpmarques/T-Dongle-S3-HelloWorld (verified working with espressif32)
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=80
    -DTFT_HEIGHT=160
    -DST7735_GREENTAB160x80
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_CS=4
    -DTFT_DC=2
    -DTFT_RST=1
    -DTFT_MOSI=3
    -DTFT_SCLK=5
    -DTFT_MISO=-1
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=0
    -DUSE_FSPI_PORT
    -DTOUCH_CS=-1
    -Wno-cpp
    -Wno-deprecated-declarations
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=27000000

; ── Libraries ──────────────────────────────────────────────
lib_deps =
    bodmer/TFT_eSPI              @ ^2.5.43
    bblanchon/ArduinoJson        @ ^7.3.1
    fastled/FastLED               @ ~3.6.0
    fhessel/esp32_https_server   @ ^1.0.0
